<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LEGO Train Control</title>

    <!-- Иконка и PWA -->
    <link rel="icon" href="photo/logo.png" type="image/png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#ffd500" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />

    <!-- Socket.IO (подключается с сервера) -->
    <script src="/socket.io/socket.io.js"></script>

    <!-- Стили приложения -->
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <!-- ── Всплывающая подсказка (tooltip) ──────────────────────── -->
    <div id="tooltip"></div>

    <!-- ── Шапка приложения ─────────────────────────────────────── -->
    <header>
      <div class="logo">
        <div class="logo-icon">🚂</div>
        <div class="logo-text">
          <strong>LEGO TRAINS</strong>
          <span>CONTROL PANEL</span>
        </div>
      </div>

      <div class="hdr-center">
        <!-- Кнопка E-STOP -->
        <button
          class="btn-estop"
          id="estopBtn"
          onclick="estop()"
          data-tip="Остановить ВСЕ поезда немедленно"
        >
          ⛔ E-STOP
        </button>

        <!-- Индикатор соединения с сервером -->
        <div class="pill" id="connPill">
          <span class="sdot"></span>
          <span id="connLabel">Подключение…</span>
        </div>
      </div>

      <div class="hdr-right">
        <!-- Кнопка мута звука -->
        <button
          class="pill"
          id="muteBtn"
          onclick="toggleMute()"
          data-tip="Выключить/включить звуки"
        >
          🔊 Звук
        </button>

        <!-- Кнопка открытия журнала событий -->
        <button
          class="pill"
          id="logBtn"
          onclick="toggleLog()"
          data-tip="Журнал событий"
        >
          📋 Лог
        </button>

        <!-- Кнопка открытия панели автоматизации -->
        <button
          class="pill"
          id="autoBtn"
          onclick="openAutoModal()"
          data-tip="Сценарии, расписание, составы"
        >
          ⚙ Авто
        </button>

        <!-- Версии библиотек (заполняется через API /api/info) -->
        <div class="pill" id="infoChip" data-tip="Версии библиотек">
          <span id="puVer">…</span>
          <span style="color: var(--mut)">·</span>
          <span id="sioVer">…</span>
        </div>
      </div>
    </header>

    <!-- ── Основной контент: карточки поездов ───────────────────── -->
    <main>
      <div id="trains" class="trains-grid"></div>

      <!-- Заглушка до подключения первого хаба -->
      <div id="noTrains" class="no-trains">
        <div class="no-trains-icon">🔵</div>
        <div class="no-trains-title">Ожидание хабов…</div>
        <div class="no-trains-sub">
          Включите хаб LEGO — он появится здесь автоматически
        </div>
      </div>
    </main>

    <!-- ── Журнал событий (выезжающая панель снизу) ─────────────── -->
    <div id="logPanel" class="log-panel">
      <div class="log-panel-header">
        <span>📋 Журнал событий</span>
        <div style="display: flex; gap: 6px; align-items: center">
          <select
            id="logFileSelect"
            class="log-file-select"
            onchange="loadLogFile()"
            style="display: none"
          ></select>
          <button
            class="pill"
            onclick="loadLogFiles()"
            data-tip="Загрузить список файлов логов"
          >
            📁
          </button>
          <button class="pill" onclick="clearLogView()">🗑</button>
          <button class="pill" onclick="toggleLog()">✕</button>
        </div>
      </div>
      <div id="logList" class="log-list"></div>
    </div>

    <!-- ── Модальное окно настроек поезда ───────────────────────── -->
    <div id="modal" class="modal-overlay" onclick="closeModal(event)">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-title">⚙ Настройки поезда</span>
          <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body" id="modalBody">
          <!-- Содержимое заполняется через openModal() в app.js -->
        </div>
      </div>
    </div>

    <!-- ── Модальное окно автоматизации (сценарии / расписание / составы) ── -->
    <div id="autoModal" class="modal-overlay" onclick="closeAutoModal(event)">
      <div class="modal-box modal-box--wide">
        <div class="modal-header">
          <span class="modal-title">⚙ Автоматизация</span>
          <button class="modal-close" onclick="closeAutoModal()">✕</button>
        </div>

        <!-- Вкладки: Сценарии / Расписание / Составы -->
        <div class="auto-tabs">
          <button
            class="auto-tab active"
            onclick="switchAutoTab('scenarios', this)"
          >
            🎬 Сценарии
          </button>
          <button class="auto-tab" onclick="switchAutoTab('schedules', this)">
            🕐 Расписание
          </button>
          <button class="auto-tab" onclick="switchAutoTab('consists', this)">
            🔗 Составы
          </button>
        </div>

        <!-- Панели вкладок (содержимое рендерится через renderScenarios/renderSchedules/renderConsists) -->
        <div id="tab-scenarios" class="auto-tab-panel active">
          <div id="scenariosContent"></div>
        </div>
        <div id="tab-schedules" class="auto-tab-panel">
          <div id="schedulesContent"></div>
        </div>
        <div id="tab-consists" class="auto-tab-panel">
          <div id="consistsContent"></div>
        </div>
      </div>
    </div>

    <!-- ── Скрипт приложения ─────────────────────────────────────── -->
    <script src="js/app.js"></script>

    <!-- ── Регистрация Service Worker (PWA) ─────────────────────── -->
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("/sw.js");
      }
    </script>
  </body>
</html>
